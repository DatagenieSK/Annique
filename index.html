<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annique | Infinite Sparkle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>Annique<span class="sparkle">✦</span></h2>
            </div>
            <div class="nav-icons">
                <div class="hamburger-menu">
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content animate-on-scroll">
            <p class="subtitle">EXQUISITE CRAFTSMANSHIP</p>
            <h1>Unleash the <br><span class="italic-accent">shining</span> beauty</h1>
            <a href="#collection" class="btn-pill">Find a Store <i class="fas fa-arrow-right" style="margin-left: 10px; font-weight: 300;"></i></a>
        </div>
    </header>

    <section id="collection" class="collection">
        <div class="collection-header animate-on-scroll">
            <h2>Find best <span class="italic-accent">Accessories</span> <br>for loved one's <span class="sparkle">✦</span></h2>
        </div>

        <div class="product-grid">
            <div class="product-card animate-on-scroll delay-1">
                <div class="product-image-box terracotta-bg">
                    <img src="https://images.unsplash.com/photo-1596910547037-846b1980329f?auto=format&fit=crop&q=80&w=800" alt="Luxury Shoes">
                </div>
                <div class="product-info">
                    <h3>Velvet Heels</h3>
                    <a href="#" class="add-to-cart">ADD TO CART &rarr;</a>
                </div>
            </div>

            <div class="product-card animate-on-scroll delay-2">
                <div class="product-image-box terracotta-bg">
                    <img src="https://images.unsplash.com/photo-1584916201218-f4242ceb4809?auto=format&fit=crop&q=80&w=800" alt="Designer Purse">
                </div>
                <div class="product-info">
                    <h3>Leather Tote</h3>
                    <a href="#" class="add-to-cart">ADD TO CART &rarr;</a>
                </div>
            </div>
        </div>
    </section>

    <section class="featured-banner animate-on-scroll">
        <div class="banner-content">
            <h2><span class="italic-accent">Glamour</span> that<br>steals the show</h2>
            <p>Hand-made luxury perfumes & accessories -</p>
        </div>
        <div class="banner-image">
             <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=1000" alt="Perfume on rock">
        </div>
        <div class="banner-footer">
            <div class="brand-icon"><i class="fas fa-crown"></i></div>
            <div class="footer-action">
                <h3>Explore Signature<br>Scents</h3>
                <a href="#" class="icon-btn"><i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
